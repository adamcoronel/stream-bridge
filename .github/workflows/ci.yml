name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    CARGO_TERM_COLOR: always

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Update Rust to stable
              run: rustup update stable

            - name: Add clippy and rustfmt
              run: rustup component add clippy rustfmt

            - name: Build
              run: cargo build

            - name: Test
              run: cargo test

            - name: Lint
              run: cargo clippy -- -D warnings

            - name: Format check
              run: cargo fmt --check
